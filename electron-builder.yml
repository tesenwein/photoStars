appId: com.photostars.app
productName: PhotoStars
copyright: Copyright © 2025

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

extraFiles:
  # Bundle the Python sidecar script with the app.
  - from: src/main/sidecar/analyzer.py
    to: resources/sidecar/analyzer.py
  - from: src/main/sidecar/requirements.txt
    to: resources/sidecar/requirements.txt

# exiftool binary (add your platform binary to build/exiftool/ before packaging).
# See: https://exiftool.org/install.html
# extraFiles:
#   - from: build/exiftool/exiftool
#     to: resources/exiftool/exiftool

mac:
  category: public.app-category.photography
  target:
    - dmg
    - zip

win:
  target:
    - nsis

linux:
  target:
    - AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
